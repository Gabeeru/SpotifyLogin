<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Spotify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Figtree", sans-serif;
        background-color: #121212;
      }
      .spotify-green {
        background-color: #1ed760;
      }
      .spotify-green:hover {
        background-color: #1fdf64;
        transform: scale(1.04);
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen text-white">
    <div class="w-full max-w-[450px] px-8 py-12 flex flex-col items-center">
      <div class="mb-10">
        <svg viewBox="0 0 167.5 167.5" class="w-10 h-10 fill-white">
          <path
            d="M83.7 0C37.5 0 0 37.5 0 83.7c0 46.3 37.5 83.7 83.7 83.7 46.3 0 83.7-37.5 83.7-83.7C167.5 37.5 130 0 83.7 0zm38.4 120.6c-1.5 2.5-4.8 3.3-7.3 1.8-19.1-11.7-43.2-14.3-71.6-7.8-2.9.7-5.8-1.2-6.5-4.1-.7-2.9 1.2-5.8 4.1-6.5 31.1-7.1 57.8-4.1 79.4 9.2 2.6 1.5 3.4 4.8 1.9 7.4zm10.2-22.8c-1.9 3.1-5.9 4.1-9 2.1-21.9-13.5-55.2-17.4-81-9.6-3.5 1.1-7.1-1-8.2-4.5-1.1-3.5 1-7.1 4.5-8.2 29.4-8.9 66.3-4.6 91.6 11 3.1 1.9 4.1 5.9 2.1 9.2zm.9-23.9C105.7 57.9 59.8 56.4 33.1 64.5c-4.1 1.3-8.6-1.1-9.8-5.3-1.3-4.1 1.1-8.6 5.3-9.8 30.6-9.3 81.4-7.5 113 11.2 3.7 2.2 5 7 2.7 10.7-2.1 3.7-6.9 5-10.6 2.6z"
          />
        </svg>
      </div>

      <h1 class="text-3xl font-black mb-10 tracking-tight">Welcome back</h1>

      <form class="w-full space-y-4">
        <div>
          <label for="email" class="block text-sm font-bold mb-2">Email</label>
          <input
            type="email"
            id="email"
            class="w-full bg-[#121212] border border-gray-500 rounded px-3 py-3 hover:border-white focus:border-white focus:outline-none transition-colors"
          />
        </div>

        <button
          type="button"
          class="w-full spotify-green text-black font-bold py-3.5 rounded-full transition-all duration-100 ease-in-out"
        >
          Continue
        </button>
      </form>

      <div class="w-full flex items-center my-6">
        <hr class="flex-grow border-gray-700" />
        <span class="px-4 text-xs font-bold">or</span>
        <hr class="flex-grow border-gray-700" />
      </div>

      <div class="w-full space-y-3">
        <button
          class="w-full flex items-center justify-between border border-gray-500 hover:border-white rounded-full px-8 py-3 transition-colors"
        >
          <img
            src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png"
            class="w-5 h-5"
            alt="Google"
          />
          <span class="font-bold flex-grow text-center"
            >Continue with Google</span
          >
        </button>

        <button
          class="w-full flex items-center justify-between border border-gray-500 hover:border-white rounded-full px-8 py-3 transition-colors"
        >
          <svg class="w-5 h-5 text-[#1877F2] fill-current" viewBox="0 0 24 24">
            <path
              d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"
            />
          </svg>
          <span class="font-bold flex-grow text-center"
            >Continue with Facebook</span
          >
        </button>

        <button
          class="w-full flex items-center justify-between border border-gray-500 hover:border-white rounded-full px-8 py-3 transition-colors"
        >
          <svg class="w-5 h-5 fill-white" viewBox="0 0 384 512">
            <path
              d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"
            />
          </svg>
          <span class="font-bold flex-grow text-center"
            >Continue with Apple</span
          >
        </button>
      </div>

      <div class="mt-10 pt-8 border-t border-gray-800 w-full text-center">
        <span class="text-gray-400">Don't have an account?</span>
        <a href="#" class="font-bold underline hover:text-green-500 ml-1"
          >Sign up</a
        >
      </div>
    </div>
  </body>
</html>
